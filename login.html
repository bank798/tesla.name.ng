<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Tesla Investment | Sign In</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --tesla-red: #E82127;
      --gold: #C8A96E;
      --gradient-red: linear-gradient(135deg, #E82127 0%, #B8151A 100%);
      --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      font-family: 'Inter', sans-serif;
      background: #0A0B0E;
      color: #FFFFFF;
      width: 100%;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background: radial-gradient(circle at 20% 30%, rgba(232,33,39,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(200,169,110,0.05) 0%, transparent 50%),
                  #0A0B0E;
    }

    input {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    .login-screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 20px 20px;
      background: transparent;
    }

    .login-content {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 4px;
    }

    .logo-svg {
      width: 44px;
      height: 44px;
      filter: drop-shadow(0 0 18px rgba(232,33,39,0.6));
      margin-bottom: 10px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--tesla-red);
    }

    .welcome-text {
      color: #8B8F96;
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #B0B3B8;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .input-wrapper i.fa-envelope,
    .input-wrapper i.fa-lock {
      position: absolute;
      left: 16px;
      color: #6B6F76;
      font-size: 16px;
      transition: var(--transition);
      pointer-events: none;
      z-index: 1;
    }

    .form-control {
      width: 100%;
      padding: 15px 50px 15px 50px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #FFFFFF;
      outline: none;
      transition: var(--transition);
      letter-spacing: 0.3px;
    }

    .form-control::placeholder {
      color: #5A5E66;
      font-weight: 400;
    }

    .form-control:focus {
      border-color: var(--tesla-red);
      background: rgba(232, 33, 39, 0.05);
      box-shadow: 0 0 0 4px rgba(232, 33, 39, 0.08);
    }

    .input-wrapper:focus-within i.fa-envelope,
    .input-wrapper:focus-within i.fa-lock {
      color: var(--tesla-red);
    }

    .toggle-password {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #6B6F76;
      cursor: pointer;
      font-size: 16px;
      padding: 8px;
      transition: var(--transition);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      line-height: 1;
    }

    .toggle-password:hover {
      color: #FFFFFF;
      background: rgba(255, 255, 255, 0.06);
    }

    .error-message {
      color: #FF6B70;
      font-size: 12px;
      margin-top: 6px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
      line-height: 1.2;
    }

    .error-message i {
      font-size: 11px;
    }

    .notification-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: rgba(0, 200, 83, 0.15);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(0, 200, 83, 0.35);
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 14px;
      color: #00E676;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 9999;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 20px 50px rgba(0, 200, 83, 0.2);
      font-weight: 500;
      letter-spacing: 0.3px;
      max-width: 90vw;
    }

    .notification-toast.error-toast {
      background: rgba(232, 33, 39, 0.15);
      border-color: rgba(232, 33, 39, 0.35);
      color: #FF6B70;
      box-shadow: 0 20px 50px rgba(232, 33, 39, 0.2);
    }

    .notification-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .notification-toast i {
      font-size: 20px;
    }

    .alert-wrapper {
      transition: all 0.3s ease;
    }

    .alert {
      background: rgba(232, 33, 39, 0.1);
      border: 1px solid rgba(232, 33, 39, 0.3);
      padding: 10px 16px;
      border-radius: 14px;
      font-size: 13px;
      color: #FF6B70;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert.success {
      background: rgba(0, 200, 83, 0.1);
      border-color: rgba(0, 200, 83, 0.3);
      color: #00C853;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #B0B3B8;
      cursor: pointer;
      font-size: 13px;
    }

    .remember-me input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 5px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .remember-me input[type="checkbox"]:checked {
      background: var(--tesla-red);
      border-color: var(--tesla-red);
    }

    .remember-me input[type="checkbox"]:checked::after {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 10px;
    }

    .forgot-link {
      color: var(--tesla-red);
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      transition: var(--transition);
    }

    .forgot-link:hover {
      text-decoration: underline;
      color: #FF4D52;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--gradient-red);
      color: #FFFFFF;
      box-shadow: 0 12px 30px rgba(232, 33, 39, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(232, 33, 39, 0.55);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
    }

    .signup-text {
      text-align: center;
      color: #8B8F96;
      font-size: 14px;
    }

    .signup-text a {
      color: var(--tesla-red);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }

    .signup-text a:hover {
      text-decoration: underline;
    }

    .btn-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 500px) {
      .login-screen {
        padding: 40px 16px 20px 16px;
      }

      .login-content {
        max-width: 100%;
        gap: 16px;
      }

      .logo-svg {
        width: 38px;
        height: 38px;
      }

      .logo-text {
        font-size: 26px;
      }

      .form-control {
        padding: 14px 44px 14px 44px;
        font-size: 14px;
      }

      .toggle-password {
        right: 4px;
        width: 34px;
        height: 34px;
      }

      .btn {
        padding: 15px;
        font-size: 14px;
      }

      .options-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }

    @media (max-width: 380px) {
      .login-screen {
        padding: 30px 12px 16px 12px;
      }

      .login-content {
        gap: 14px;
      }

      .form-control {
        padding: 13px 40px 13px 40px;
        font-size: 13px;
        border-radius: 14px;
      }

      .toggle-password {
        right: 2px;
        width: 30px;
        height: 30px;
        font-size: 14px;
      }

      .btn {
        padding: 14px;
        font-size: 13px;
        border-radius: 14px;
      }

      .logo-text {
        font-size: 22px;
      }

      .logo-svg {
        width: 34px;
        height: 34px;
      }

      .welcome-text {
        font-size: 12px;
      }

      .error-message {
        font-size: 11px;
        min-height: 18px;
      }

      .remember-me {
        font-size: 12px;
      }

      .forgot-link {
        font-size: 12px;
      }
    }

    @media (min-width: 768px) {
      .login-screen {
        padding: 80px 20px 20px 20px;
      }

      .login-content {
        gap: 22px;
      }
    }

    @media (min-width: 1024px) {
      .login-screen {
        padding: 100px 20px 20px 20px;
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.7s ease-out;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(25px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="notification-toast" id="notificationToast">
    <i class="fas fa-check-circle"></i>
    <span id="notificationMessage">Login successful.</span>
  </div>

  <div class="login-screen">
    <div class="login-content fade-in-up">
      
      <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 40 40" fill="none">
          <defs>
            <linearGradient id="loginLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#E82127"/>
              <stop offset="100%" style="stop-color:#B8151A"/>
            </linearGradient>
          </defs>
          <path d="M20 2L37 34H3L20 2Z" fill="url(#loginLogoGrad)"/>
          <path d="M20 8L31 30H9L20 8Z" fill="#FFFFFF"/>
        </svg>
        <div class="logo-text">TESLA<span>.</span></div>
        <p class="welcome-text">Welcome back, sign in to continue</p>
      </div>

      <div class="alert-wrapper" id="alertWrapper" style="display: none;">
        <div class="alert" id="loginAlert">
          <i class="fas fa-exclamation-circle"></i>
          <span id="alertMessage">Invalid email or password.</span>
        </div>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input 
              type="email" 
              id="email" 
              class="form-control" 
              placeholder="example@gmail.com" 
              required 
              autocomplete="email"
              spellcheck="false"
            >
          </div>
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input 
              type="password" 
              id="password" 
              class="form-control" 
              placeholder="" 
              required 
              autocomplete="current-password"
              minlength="6"
            >
            <button type="button" class="toggle-password" id="togglePassword" tabindex="-1" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span>Remember me</span>
          </label>
          <a href="forget.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <p class="signup-text">
        Don't have an account? <a href="create.html">Create one</a>
      </p>

    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const VALID_EMAIL = 'dennisnewhouse@gmail.com';
      const VALID_PASSWORD = 'Dennis2026';
      const LOADING_DURATION = 3000; // 3 seconds in milliseconds

      const togglePasswordBtn = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');
      
      if (togglePasswordBtn && passwordInput) {
        togglePasswordBtn.addEventListener('click', function(e) {
          e.preventDefault();
          const icon = this.querySelector('i');
          if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
          } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
          }
        });
      }

      const loginForm = document.getElementById('loginForm');
      const alertWrapper = document.getElementById('alertWrapper');
      const loginAlert = document.getElementById('loginAlert');
      const alertMessage = document.getElementById('alertMessage');
      const emailInput = document.getElementById('email');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
      const loginBtn = document.getElementById('loginBtn');
      const notificationToast = document.getElementById('notificationToast');
      const notificationMessage = document.getElementById('notificationMessage');
      
      if (emailInput) {
        emailInput.addEventListener('input', function() {
          if (emailError) emailError.innerHTML = '';
        });
      }
      
      if (passwordInput) {
        passwordInput.addEventListener('input', function() {
          if (passwordError) passwordError.innerHTML = '';
        });
      }
      
      function showNotification(message, type = 'success') {
        if (!notificationToast || !notificationMessage) return;
        
        notificationMessage.textContent = message;
        
        if (type === 'success') {
          notificationToast.style.background = 'rgba(0, 200, 83, 0.15)';
          notificationToast.style.borderColor = 'rgba(0, 200, 83, 0.35)';
          notificationToast.style.color = '#00E676';
          notificationToast.querySelector('i').className = 'fas fa-check-circle';
          notificationToast.classList.remove('error-toast');
        } else {
          notificationToast.style.background = 'rgba(232, 33, 39, 0.15)';
          notificationToast.style.borderColor = 'rgba(232, 33, 39, 0.35)';
          notificationToast.style.color = '#FF6B70';
          notificationToast.querySelector('i').className = 'fas fa-exclamation-circle';
          notificationToast.classList.add('error-toast');
        }
        
        notificationToast.classList.add('show');
        
        clearTimeout(window.notifTimeout);
        window.notifTimeout = setTimeout(() => {
          notificationToast.classList.remove('show');
        }, 4000);
      }
      
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          if (alertWrapper) alertWrapper.style.display = 'none';
          if (emailError) emailError.innerHTML = '';
          if (passwordError) passwordError.innerHTML = '';
          
          const email = emailInput ? emailInput.value.trim() : '';
          const password = passwordInput ? passwordInput.value : '';
          let hasError = false;
          
          if (!email) {
            if (emailError) emailError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Email is required';
            hasError = true;
          } else if (!isValidEmail(email)) {
            if (emailError) emailError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter a valid email';
            hasError = true;
          }
          
          if (!password) {
            if (passwordError) passwordError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password is required';
            hasError = true;
          } else if (password.length < 6) {
            if (passwordError) passwordError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be at least 6 characters';
            hasError = true;
          }
          
          if (hasError) return;
          
          // Show loading spinner FIRST - always load for 3 seconds
          loginBtn.disabled = true;
          loginBtn.innerHTML = '<span class="btn-spinner"></span> Signing in...';
          
          // Wait 3 seconds THEN check credentials
          setTimeout(() => {
            if (email !== VALID_EMAIL || password !== VALID_PASSWORD) {
              // Reset button
              loginBtn.disabled = false;
              loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
              // Show error notification
              showNotification('Invalid credentials.', 'error');
              return;
            }
            
            // Credentials are correct - show success and redirect
            showNotification('Login successful.', 'success');
            
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1000);
          }, LOADING_DURATION);
        });
      }
      
      function isValidEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }
      
      if (window.history.replaceState) {
        window.history.replaceState(null, null, window.location.href);
      }
    })();
  </script>
</body>
</html>
